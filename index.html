<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#00b88c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FitForge"/>
<meta name="application-name" content="FitForge"/>
<meta name="format-detection" content="telephone=no"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="data:image/png;base64,..."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════ 
   CSS VARIABLES & GLOBAL 
══════════════════════════════════════ */
:root {
  --navy: #0a192f;
  --teal: #00b88c;
  --teal-dark: #008f6c;
  --teal-light: #e0f7f0;
  --white: #ffffff;
  --bg: #f4f7f6;
  --bg2: #edf2f0;
  --text1: #1a202c;
  --text2: #4a5568;
  --text3: #718096;
  --border: #e2e8f0;
  --card: #ffffff;
  --red: #ff4757;
  --orange: #ff8c42;
  --nav-h: 70px;
  --r-sm: 12px;
  --r-lg: 20px;
  --shadow: 0 4px 12px rgba(0,0,0,0.05);
  --shadow-md: 0 10px 25px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Figtree', sans-serif;
  background-color: var(--bg);
  color: var(--text1);
  margin: 0;
  padding: 0;
  line-height: 1.5;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 10px);
}
.page { display: none; min-height: 100vh; padding-top: 10px; }
.page.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* ══════════════════════════════════════ 
   SHARED COMPONENTS 
══════════════════════════════════════ */
.card { background: var(--card); border-radius: var(--r-lg); margin: 0 14px 14px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.03); }
.card-pad { padding: 18px 20px; }
.section-title { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800; color: var(--navy); margin-bottom: 16px; }

/* ── [Rest of original CSS - Snippets 3-11] ── */
/* AI SCANNER MODAL SPECIFIC CSS */
.scan-status { display: none; text-align: center; padding: 20px; }
.scan-status.active { display: block; }
.scan-photo-btn { width: 100%; display: flex; align-items: center; gap: 15px; padding: 16px 20px; background: white; border: 2px solid var(--teal); border-radius: 16px; margin: 15px 0; cursor: pointer; text-align: left; }
.scan-btn-icon { font-size: 1.6rem; }
.scan-btn-title { font-weight: 800; color: var(--navy); }
.scan-btn-sub { font-size: 0.72rem; color: var(--text3); }
</style>
</head>
<body>

<div style="background:var(--navy); color:white; padding:12px 18px; font-size:0.8rem; font-weight:700; display:flex; justify-content:space-between; align-items:center;">
    <span id="profileDisplayName" onclick="editName()">FitForge User</span>
    <span id="headerWeight">0.0 kg</span>
</div>

<div id="page-foodlog" class="page active">
    <div class="card card-pad" style="background:linear-gradient(135deg, #0a192f 0%, #004d40 100%); color:white; border:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span style="font-size:0.85rem; opacity:0.8;">Daily Summary</span>
            <span id="calBudgetBadge" style="background:rgba(255,255,255,0.15); padding:4px 10px; border-radius:20px; font-size:0.7rem;">1,850 kcal budget</span>
        </div>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; text-align:center;">
            <div><div id="ltbKcal" style="font-size:1.2rem; font-weight:800;">0</div><div style="font-size:0.6rem; opacity:0.6;">KCAL</div></div>
            <div><div id="ltbProtein" style="font-size:1.2rem; font-weight:800;">0g</div><div style="font-size:0.6rem; opacity:0.6;">PRO</div></div>
            <div><div id="ltbCarbs" style="font-size:1.2rem; font-weight:800;">0g</div><div style="font-size:0.6rem; opacity:0.6;">CARB</div></div>
            <div><div id="ltbFat" style="font-size:1.2rem; font-weight:800;">0g</div><div style="font-size:0.6rem; opacity:0.6;">FAT</div></div>
        </div>
    </div>

    <div class="card card-pad">
        <input type="file" id="photoFileInput" accept="image/*" capture="environment" style="display:none" onchange="processImage(this)">
        <button class="scan-photo-btn" onclick="document.getElementById('photoFileInput').click()">
            <div class="scan-btn-icon">📸</div>
            <div class="scan-btn-text">
                <div class="scan-btn-title">Scan Food with AI</div>
                <div class="scan-btn-sub">Take a photo to estimate macros</div>
            </div>
        </button>
        
        <div id="scanStatusLoading" class="scan-status" style="background:var(--teal-light); color:var(--teal); border-radius:12px; margin-top:10px;">
            Analyzing meal...
        </div>
        <div id="scanStatusResult" class="scan-status" style="border:2px solid var(--teal); border-radius:12px; margin-top:10px;">
            <h4 id="resName" style="margin:0 0 5px 0; color:var(--navy);"></h4>
            <p id="resMacros" style="font-weight:800; color:var(--teal); margin:0 0 10px 0;"></p>
            <button onclick="logScannedMeal()" style="background:var(--teal); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; width:100%;">Log This Meal</button>
        </div>
    </div>

    <div class="card card-pad">
        <div class="water-header">
            <div><div class="water-title">Hydration</div><div class="water-sub">Daily target: 3.75L</div></div>
            <div id="waterPct" class="water-pct">0%</div>
        </div>
        <div id="waterCupsContainer" class="water-cups"></div>
    </div>
</div>

<div id="page-workout" class="page">
    <div class="card card-pad">
        <div class="section-title">LISS Treadmill Protocol</div>
        <table style="width:100%; font-size:0.8rem; border-collapse:collapse;">
            <thead><tr style="border-bottom:1px solid var(--border); text-align:left;"><th>Min</th><th>Phase</th><th>Speed</th><th>Incline</th></tr></thead>
            <tbody id="workoutTableBody"></tbody>
        </table>
    </div>
</div>

<div id="page-weight" class="page">
    <div class="card card-pad">
        <div class="section-title">Weight Tracker</div>
        <div style="display:flex; gap:10px;">
            <input type="number" id="weightInput" step="0.1" placeholder="0.0" style="padding:12px; border-radius:10px; border:1px solid var(--border); flex:1;">
            <button onclick="logWeight()" style="background:var(--navy); color:white; border:none; padding:12px 20px; border-radius:10px; font-weight:700;">Log</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-item active" onclick="showPage('foodlog', this)">🍴 Log</button>
    <button class="nav-item" onclick="showPage('workout', this)">🏃 Train</button>
    <button class="nav-item" onclick="showPage('weight', this)">⚖️ Weight</button>
</div>

<script>
// ── CORE DATA & PERSISTENCE ──
const ls = (k, def) => localStorage.getItem(k) || def;
const lsSet = (k, v) => localStorage.setItem(k, v);

// ── INITIALIZATION ──
window.onload = () => {
    document.getElementById('profileDisplayName').textContent = ls('username', 'FitForge User');
    buildWorkoutTable();
    updateMacroDisplay();
    // Prompt for key if missing
    if(!ls('gemini_api_key', '')) {
        const key = prompt("Please enter your Gemini API Key to use the Food Scanner:");
        if(key) lsSet('gemini_api_key', key);
    }
};

function showPage(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    btn.classList.add('active');
}

// ── FIXED AI SCANNER LOGIC ──
let lastScannedFood = null;

async function processImage(input) {
    const file = input.files[0];
    if (!file) return;

    const statusLoading = document.getElementById('scanStatusLoading');
    const statusResult = document.getElementById('scanStatusResult');
    
    statusLoading.style.display = 'block';
    statusResult.style.display = 'none';

    const reader = new FileReader();
    reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        const apiKey = ls('gemini_api_key', '');
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{ parts: [
                { text: "Return ONLY a JSON object for this food image: {\"name\":\"Food Name\",\"kcal\":0,\"p\":0,\"c\":0,\"f\":0}. Do not include markdown formatting or extra text." },
                { inline_data: { mime_type: file.type, data: base64 } }
            ]}]
        };

        try {
            const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            const rawText = data.candidates[0].content.parts[0].text;
            // Clean markdown and parse
            const cleanJson = rawText.replace(/```json|```/g, "").trim();
            lastScannedFood = JSON.parse(cleanJson);
            
            statusLoading.style.display = 'none';
            statusResult.style.display = 'block';
            document.getElementById('resName').innerText = lastScannedFood.name;
            document.getElementById('resMacros').innerText = `${lastScannedFood.kcal} kcal | P:${lastScannedFood.p}g C:${lastScannedFood.c}g F:${lastScannedFood.f}g`;
        } catch (err) {
            statusLoading.style.display = 'none';
            alert("Scanner Error: Ensure your API key is correct and you have an internet connection.");
        }
    };
    reader.readAsDataURL(file);
}

function logScannedMeal() {
    if(!lastScannedFood) return;
    let log = JSON.parse(ls('foodLog', '[]'));
    log.push({ ...lastScannedFood, id: Date.now(), date: new Date().toISOString() });
    lsSet('foodLog', JSON.stringify(log));
    updateMacroDisplay();
    document.getElementById('scanStatusResult').style.display = 'none';
    alert("Meal Logged!");
}

function updateMacroDisplay() {
    const log = JSON.parse(ls('foodLog', '[]'));
    const totals = log.reduce((acc, curr) => {
        acc.kcal += curr.kcal; acc.p += curr.p; acc.c += curr.c; acc.f += curr.f;
        return acc;
    }, { kcal:0, p:0, c:0, f:0 });

    document.getElementById('ltbKcal').innerText = totals.kcal;
    document.getElementById('ltbProtein').innerText = totals.p + 'g';
    document.getElementById('ltbCarbs').innerText = totals.c + 'g';
    document.getElementById('ltbFat').innerText = totals.f + 'g';
}

// ── WORKOUT TABLE [Snippet 17] ──
const WORKOUT_ROWS = [
    { min:'00–05', phase:'warm', speed:3.5, incline:4 },
    { min:'05–08', phase:'burn', speed:3.8, incline:5 },
    { min:'08–11', phase:'burn', speed:4.0, incline:6 },
    { min:'11–14', phase:'burn', speed:4.0, incline:7 },
    { min:'14–17', phase:'burn', speed:4.1, incline:8 }
];

function buildWorkoutTable() {
    const tbody = document.getElementById('workoutTableBody');
    tbody.innerHTML = WORKOUT_ROWS.map(row => `
        <tr style="border-bottom:1px solid #eee;">
            <td style="padding:12px 0;">${row.min}</td>
            <td><span style="text-transform:uppercase; font-size:0.65rem; font-weight:bold;">${row.phase}</span></td>
            <td>${row.speed}</td>
            <td>${row.incline}</td>
        </tr>
    `).join('');
}
</script>
</body>
</html>
